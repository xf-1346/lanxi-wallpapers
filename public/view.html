<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanxi-蓝希 免费壁纸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0c1220 0%, #1a2744 50%, #0f1a2e 100%);
            color: #fff; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header { text-align: center; padding: 60px 20px 50px; }
        .header h1 { 
            font-size: 42px; font-weight: 800; letter-spacing: 3px;
            background: linear-gradient(135deg, #1e3a8f 0%, #60a5fa 20%, #c084fc 45%, #60a5fa 70%, #1e3a8f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }
        .header p { color: #8ab4f8; font-size: 16px; letter-spacing: 2px; opacity: 0.9; margin-top: 15px; }
        
        .gallery-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 24px; padding: 20px; max-width: 1400px; margin: 0 auto;
        }
        @media (max-width: 1200px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
        @media (max-width: 600px) { .gallery-grid { grid-template-columns: 1fr; gap: 12px; } }
        
        .wallpaper-item {
            position: relative; border-radius: 16px; overflow: hidden;
            background: rgba(15, 26, 46, 0.6); cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 3/4; border: 1px solid rgba(58, 123, 213, 0.15);
        }
        .wallpaper-item:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(58, 123, 213, 0.35);
            border-color: rgba(58, 123, 213, 0.4);
        }
        .wallpaper-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .wallpaper-item:hover img { transform: scale(1.1); }
        
        .hover-info {
            position: absolute; left: 0; bottom: 0; right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(12, 18, 32, 0.95), transparent);
            opacity: 0; transition: opacity 0.4s ease;
        }
        .wallpaper-item:hover .hover-info { opacity: 1; }
        .wallpaper-title {
            font-size: 15px; font-weight: 600;
            background: linear-gradient(90deg, #5c9cf5, #8ab4f8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transform: translateY(10px); transition: transform 0.4s ease;
        }
        .wallpaper-item:hover .wallpaper-title { transform: translateY(0); }
        
        .detail-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(8, 12, 24, 0.98);
            z-index: 1000; overflow-y: auto; backdrop-filter: blur(30px);
        }
        .detail-modal.active { display: flex; align-items: center; justify-content: center; }
        .detail-container {
            max-width: 1000px; width: 90%;
            display: grid; grid-template-columns: 1.2fr 1fr;
            gap: 50px; align-items: center;
        }
        @media (max-width: 768px) {
            .detail-container { grid-template-columns: 1fr; gap: 30px; margin: 20px auto; }
            .detail-modal.active { display: block; padding: 20px 0; }
        }
        .detail-image { border-radius: 20px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.5); border: 1px solid rgba(58, 123, 213, 0.3); }
        .detail-image img { width: 100%; height: auto; display: block; }
        .detail-content { display: flex; flex-direction: column; gap: 25px; }
        .detail-title-wrap { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; line-height: 1.4; }
        .detail-title {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #5c9cf5, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .detail-download {
            font-size: 16px; color: #3b82f6; cursor: pointer;
            transition: all 0.3s ease; font-weight: 500;
            border-bottom: 1px solid rgba(59, 130, 246, 0.5); padding-bottom: 2px;
        }
        .detail-download:hover { color: #60a5fa; border-bottom-color: #60a5fa; }
        .detail-desc {
            font-size: 15px; color: #8ab4f8; line-height: 1.9;
            padding: 20px 0; border-top: 1px solid rgba(58, 123, 213, 0.2);
            border-bottom: 1px solid rgba(58, 123, 213, 0.2);
        }
        
        .close-btn {
            position: fixed; top: 30px; right: 40px; width: 50px; height: 50px;
            border-radius: 50%; background: rgba(58, 123, 213, 0.15);
            border: 1px solid rgba(58, 123, 213, 0.4); color: #8ab4f8;
            font-size: 24px; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; z-index: 1001;
        }
        .close-btn:hover { background: rgba(58, 123, 213, 0.3); color: #fff; }
        
        .footer-link {
            text-align: center; padding: 60px 20px; margin-top: 80px;
            background: rgba(15, 26, 46, 0.6); border-top: 1px solid rgba(58, 123, 213, 0.3);
        }
        .footer-link p { color: #8ab4f8; font-size: 16px; }
        .footer-link a { color: #5c9cf5; text-decoration: none; border-bottom: 1px solid rgba(92, 156, 245, 0.5); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #3a7bd5; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Lanxi-蓝希 免费壁纸</h1>
        <p>本网页静态壁纸免费下载</p>
    </div>
    <div class="gallery-grid" id="displayGallery"></div>
    <div class="footer-link">
        <p>短视频可前往我的主页：<a href="https://ifdian.net/a/ws2lx" target="_blank">https://ifdian.net/a/ws2lx</a></p>
    </div>

    <div class="detail-modal" id="detailModal">
        <button class="close-btn" onclick="closeDetail()">&times;</button>
        <div class="detail-container">
            <div class="detail-image">
                <img id="detailImage" src="" alt="">
            </div>
            <div class="detail-content">
                <div class="detail-title-wrap">
                    <span class="detail-title" id="detailTitle"></span>
                    <span class="detail-download" onclick="downloadCurrent()">壁纸下载</span>
                </div>
                <p class="detail-desc" id="detailDesc"></p>
            </div>
        </div>
    </div>

    <script>
        let wallpapers = [];
        let currentWallpaper = null;

        async function init() {
            await loadData();
            renderDisplay();
            recordView();
        }

        async function loadData() {
            try {
                const res = await fetch('/api/wallpapers');
                wallpapers = await res.json();
            } catch (e) {
                console.error('Failed to load data', e);
            }
        }

        async function recordView() {
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                stats.views++;
                await fetch('/api/stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(stats)
                });
            } catch (e) {}
        }

        function renderDisplay() {
            const gallery = document.getElementById('displayGallery');
            if (wallpapers.length === 0) { 
                gallery.innerHTML = '<p style="color: #8ab4f8; text-align: center;">暂无壁纸</p>'; 
                return; 
            }
            gallery.innerHTML = wallpapers.map((w, i) => {
                const descText = w.desc || w.description || '高清精美壁纸，支持手机和电脑使用';
                return `
                <div class="wallpaper-item" onclick="openDetail(${w.id})" style="animation: fadeInUp 0.5s ease ${i * 0.1}s backwards">
                    <img src="${w.url}" alt="${w.text}" loading="lazy" onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#1a2744,#0f1a2e)';this.parentElement.innerHTML+='<div style=display:flex;align-items:center;justify-content:center;height:100%;color:#8ab4f8>图片加载失败</div>'">
                    <div class="hover-info">
                        <div class="wallpaper-title">${w.text}</div>
                    </div>
                </div>
            `}).join('');
        }

        function openDetail(id) {
            const wallpaper = wallpapers.find(w => w.id === id);
            if (!wallpaper) return;
            currentWallpaper = wallpaper;
            document.getElementById('detailImage').src = wallpaper.url;
            document.getElementById('detailTitle').textContent = wallpaper.text;
            document.getElementById('detailDesc').textContent = wallpaper.desc || wallpaper.description || '高清精美壁纸，支持手机和电脑使用';
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        async function downloadCurrent() {
            if (!currentWallpaper) return;
            currentWallpaper.downloads = (currentWallpaper.downloads || 0) + 1;
            
            await fetch(`/api/wallpapers/${currentWallpaper.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ downloads: currentWallpaper.downloads })
            });
            
            const statsRes = await fetch('/api/stats');
            const stats = await statsRes.json();
            stats.downloads++;
            await fetch('/api/stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(stats)
            });
            
            const a = document.createElement('a');
            a.href = currentWallpaper.url;
            a.download = `蓝希_${currentWallpaper.text}.jpg`;
            a.click();
        }

        document.addEventListener('keydown', (e) => { 
            if (e.key === 'Escape') closeDetail();
        });

        init();
    </script>
</body>
</html>
